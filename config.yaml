origin:
  host: localhost
  port: 3308
  user: readonly_clann
  password: "readonly_clann"
  database: clann_prod

keepUsernames:
  - "srota2"
  - "dberetta"
  - "ocarrara"

# excludeTables are not created at all
excludeTables:
  - "^temp_.*"
  - ".*_BO$"
  - ".*_preprod$"
  - ".*_temp$"

# emptyTables are created but no data is added
emptyTables:
  - ".*_AUD$"
  - "^REVINFO$"
  - "^externalcv$"
  # Large tables with no path to Anagrafica
  - "^Charges$"
  - "^Medico$"
  - "^Lavoratore$"
  - "^Residenza$"
  - "^Reperibilita$"
  - "^Attestato$"
  - "^Ricovero$"
  - "^Dimissioni$"
  - "^Annullamento$"
  - "^MilestonePagamento$"
  - "^TipologiaMappatura$"
  - "^ControlloAnagrafica$"
  - "^Forecast$"
  - "^FinalForecast$"
  - "^agip$"
  - "^ProgettoOwnersConcat$"

excludeFields:
  - table: CoursePersonalCV
    field: fileData
  - table: CertificationPersonalCV
    field: fileData
  - table: Employee
    field: foto

softRelationships:
  - fromTable: OreLavorateInSede
    fromColumn: idAnagrafica
    toTable: Anagrafica
    toColumn: id
  - fromTable: PayRoll
    fromColumn: employeeNumber
    toTable: Anagrafica
    toColumn: employeeNumber
  - fromTable: AttivitaSalesAdmin
    fromColumn: idAnagrafica
    toTable: Anagrafica
    toColumn: id
