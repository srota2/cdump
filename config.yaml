    fromColumn: idAttivita
    toTable: Attivita
    toColumn: id
  - fromTable: PayRollPresenceBook
    fromColumn: employeeNumber
    toTable: Anagrafica
    toColumn: employeeNumber
  - fromTable: PayRollPresenceBookDifferences
    fromColumn: employeeNumber
    toTable: Anagrafica
    toColumn: employeeNumber
  - fromTable: DatiMonitoraggio
    fromColumn: employeeNumber
    toTable: Anagrafica
    toColumn: employeeNumber
  - fromTable: Employee
    fromColumn: employeeNumber
    toTable: Anagrafica
    toColumn: employeeNumber
  - fromTable: Opportunita
    fromColumn: idAnagrafica
    toTable: Anagrafica
    toColumn: id
  - fromTable: InternalCV
    fromColumn: registry_id
    toTable: Anagrafica
    toColumn: id
  # CV detail tables (MyISAM, no real FKs)
  - fromTable: TechnicalCompetenceInternalCV
    fromColumn: internalcv_id
    toTable: InternalCV
    toColumn: id
  - fromTable: SkillLanguageCV
    fromColumn: internalcv_id
    toTable: InternalCV
    toColumn: id
  - fromTable: ProfessionalExperienceCV
    fromColumn: internalcv_id
    toTable: InternalCV
    toColumn: id
  - fromTable: CoursePersonalCV
    fromColumn: internalcv_id
    toTable: InternalCV
    toColumn: id
  - fromTable: CertificationPersonalCV
    fromColumn: internalcv_id
    toTable: InternalCV
    toColumn: id
  # CV join/detail → catalog tables (MyISAM, no real FKs)
  - fromTable: TechnicalCompetenceInternalCV
    fromColumn: technicalCompetencecv_id
    toTable: TechnicalCompetenceCV
    toColumn: id
  - fromTable: CoursePersonalCV
    fromColumn: coursecv_id
    toTable: CourseCV
    toColumn: id
  - fromTable: CertificationPersonalCV
    fromColumn: certificationcv_id
    toTable: CertificationCV
    toColumn: id

